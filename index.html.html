<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>1150628學員作品大廳 - 數位學習入口</title>
    <style>
        /* --- 基礎變數與重設 --- */
        :root {
            --bg-color: #0d0e15;
            --card-bg: #1a1c26;
            --neon-cyan: #00f0ff;
            --neon-pink: #ff0055;
            --text-main: #e0e6ed;
            --text-dim: #94a3b8;
            --glow-shadow: 0 0 15px rgba(0, 240, 255, 0.4);
            --transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            background-color: var(--bg-color);
            background-image: radial-gradient(circle at 50% 50%, #1a1c26 0%, #0d0e15 100%);
            color: var(--text-main);
            font-family: "Segoe UI", Roboto, "Helvetica Neue", sans-serif;
            line-height: 1.6;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            overflow-x: hidden;
        }

        /* --- 無障礙隱藏區塊 --- */
        .visually-hidden {
            position: absolute;
            width: 1px;
            height: 1px;
            padding: 0;
            margin: -1px;
            overflow: hidden;
            clip: rect(0, 0, 0, 0);
            white-space: nowrap;
            border: 0;
        }

        /* --- 頁首設計 --- */
        header {
            text-align: center;
            padding: 60px 20px;
            animation: fadeInDown 0.8s ease-out;
        }

        h1 {
            font-size: 3rem;
            color: var(--neon-cyan);
            text-transform: uppercase;
            letter-spacing: 4px;
            text-shadow: 0 0 10px var(--neon-cyan), 0 0 20px rgba(0, 240, 255, 0.5);
            margin-bottom: 10px;
        }

        .subtitle {
            font-size: 1.2rem;
            color: var(--neon-pink);
            font-weight: bold;
            letter-spacing: 2px;
            text-shadow: 0 0 5px var(--neon-pink);
        }

        /* --- 作品網格 --- */
        main {
            width: 100%;
            max-width: 1100px;
            padding: 20px;
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(300px, 1fr));
            gap: 30px;
            margin-bottom: 60px;
        }

        .card {
            background: var(--card-bg);
            border: 1px solid rgba(0, 240, 255, 0.2);
            border-radius: 12px;
            padding: 30px;
            text-decoration: none;
            color: inherit;
            display: flex;
            flex-direction: column;
            align-items: center;
            text-align: center;
            transition: var(--transition);
            position: relative;
            overflow: hidden;
            animation: fadeInUp 0.6s ease-out backwards;
        }

        .card:nth-child(1) { animation-delay: 0.2s; }
        .card:nth-child(2) { animation-delay: 0.4s; }
        .card:nth-child(3) { animation-delay: 0.6s; }

        .card::before {
            content: "";
            position: absolute;
            top: 0; left: 0; width: 100%; height: 4px;
            background: linear-gradient(90deg, var(--neon-cyan), var(--neon-pink));
            opacity: 0.5;
        }

        .card:hover, .card:focus {
            transform: translateY(-10px);
            border-color: var(--neon-cyan);
            box-shadow: 0 0 30px rgba(0, 240, 255, 0.3);
            outline: none;
        }

        .card:focus {
            outline: 3px solid var(--neon-pink);
            outline-offset: 4px;
        }

        .card-icon {
            font-size: 4rem;
            margin-bottom: 20px;
            filter: drop-shadow(0 0 10px rgba(255,255,255,0.3));
        }

        .card-title {
            font-size: 1.5rem;
            color: var(--neon-cyan);
            margin-bottom: 15px;
        }

        .card-desc {
            color: var(--text-dim);
            font-size: 0.95rem;
            margin-bottom: 25px;
            flex-grow: 1;
        }

        .card-btn {
            background: transparent;
            border: 1px solid var(--neon-cyan);
            color: var(--neon-cyan);
            padding: 8px 20px;
            border-radius: 4px;
            font-weight: bold;
            transition: var(--transition);
        }

        .card:hover .card-btn {
            background: var(--neon-cyan);
            color: var(--bg-color);
            box-shadow: 0 0 15px var(--neon-cyan);
        }

        /* --- 資料管理區塊 --- */
        .data-panel {
            width: calc(100% - 40px);
            max-width: 800px;
            background: rgba(26, 28, 38, 0.8);
            border: 1px dashed var(--text-dim);
            border-radius: 12px;
            padding: 40px;
            text-align: center;
            margin-bottom: 80px;
        }

        .data-panel h2 {
            color: var(--text-main);
            margin-bottom: 10px;
            font-size: 1.5rem;
        }

        .data-panel p {
            color: var(--text-dim);
            margin-bottom: 25px;
        }

        .btn-group {
            display: flex;
            gap: 20px;
            justify-content: center;
            flex-wrap: wrap;
        }

        .btn {
            padding: 12px 28px;
            font-size: 1rem;
            font-weight: bold;
            cursor: pointer;
            border-radius: 6px;
            transition: var(--transition);
            border: none;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .btn-export {
            background-color: var(--neon-cyan);
            color: var(--bg-color);
        }

        .btn-export:hover, .btn-export:focus {
            box-shadow: 0 0 20px var(--neon-cyan);
            transform: scale(1.05);
        }

        .btn-import {
            background-color: transparent;
            border: 2px solid var(--neon-pink);
            color: var(--neon-pink);
        }

        .btn-import:hover, .btn-import:focus {
            background-color: var(--neon-pink);
            color: white;
            box-shadow: 0 0 20px var(--neon-pink);
            transform: scale(1.05);
        }

        .btn:focus {
            outline: 3px solid white;
            outline-offset: 4px;
        }

        /* --- 動畫定義 --- */
        @keyframes fadeInDown {
            from { opacity: 0; transform: translateY(-30px); }
            to { opacity: 1; transform: translateY(0); }
        }

        @keyframes fadeInUp {
            from { opacity: 0; transform: translateY(40px); }
            to { opacity: 1; transform: translateY(0); }
        }

        /* 響應式調整 */
        @media (max-width: 600px) {
            h1 { font-size: 2rem; }
            .data-panel { padding: 20px; }
        }
    </style>
</head>
<body>

    <!-- 螢幕閱讀器報讀區 -->
    <div id="announcer" class="visually-hidden" aria-live="polite"></div>

    <header>
        <h1>1150628學員作品大廳</h1>
        <p class="subtitle" aria-hidden="true">DIGITAL LEARNING & ACCESSIBILITY HUB</p>
    </header>

    <main role="list" aria-label="作品導覽清單">
        <!-- 作品 1 -->
        <a href="01 geo115exam.html" class="card" role="listitem">
            <div class="card-icon" aria-hidden="true">🌏</div>
            <h2 class="card-title">地理作答平台 A3306</h2>
            <p class="card-desc">115學年度專屬地理學科評量系統，支援全鍵盤操作與螢幕閱讀器優化。</p>
            <div class="card-btn">啟動平台 →</div>
        </a>

        <!-- 作品 2 -->
        <a href="02-2000cloze.html" class="card" role="listitem">
            <div class="card-icon" aria-hidden="true">📝</div>
            <h2 class="card-title">兩千單無障礙克漏字</h2>
            <p class="card-desc">強化英語詞彙記憶，專為視障學習者設計的克漏字測驗介面。</p>
            <div class="card-btn">啟動平台 →</div>
        </a>

        <!-- 作品 3 -->
        <a href="03-calendar.html" class="card" role="listitem">
            <div class="card-icon" aria-hidden="true">📅</div>
            <h2 class="card-title">通用日曆待辦規劃</h2>
            <p class="card-desc">整合小麥麥風格的簡約日曆，管理您的學習進度與每日待辦事項。</p>
            <div class="card-btn">啟動平台 →</div>
        </a>
    </main>

    <section class="data-panel" aria-labelledby="data-title">
        <h2 id="data-title">💾 平台全域進度管理</h2>
        <p>您可以備份此瀏覽器中所有的學習記錄，或從先前的備份檔還原進度。</p>
        
        <div class="btn-group">
            <button class="btn btn-export" onclick="exportProgress()">
                <span>📤 匯出平台進度</span>
            </button>
            <button class="btn btn-import" onclick="document.getElementById('importFile').click()">
                <span>📥 載入平台進度</span>
            </button>
            <!-- 隱藏的檔案輸入框 -->
            <input type="file" id="importFile" class="visually-hidden" accept=".json" onchange="importProgress(event)">
        </div>
    </section>

    <script>
        /**
         * 輔助功能：報讀訊息給 NVDA 並顯示 Alert
         */
        function announce(msg) {
            const announcer = document.getElementById('announcer');
            announcer.textContent = msg;
            // 視覺提示
            alert(msg);
        }

        /**
         * 核心功能：匯出 LocalStorage 
         */
        function exportProgress() {
            try {
                const storageData = {};
                // 遍歷所有 localStorage 鍵值
                for (let i = 0; i < localStorage.length; i++) {
                    const key = localStorage.key(i);
                    storageData[key] = localStorage.getItem(key);
                }

                if (Object.keys(storageData).length === 0) {
                    announce("目前沒有任何進度資料可以匯出。");
                    return;
                }

                const exportObj = {
                    projectName: "1150628學員作品大廳",
                    exportedAt: new Date().toLocaleString(),
                    data: storageData
                };

                const dataStr = JSON.stringify(exportObj, null, 2);
                const dataUri = 'data:application/json;charset=utf-8,' + encodeURIComponent(dataStr);
                
                const timestamp = new Date().toISOString().replace(/[:.]/g, '-').slice(0, 19);
                const exportFileName = `1150628_平台進度備份_${timestamp}.json`;

                const linkElement = document.createElement('a');
                linkElement.setAttribute('href', dataUri);
                linkElement.setAttribute('download', exportFileName);
                linkElement.click();

                announce("進度匯出成功！檔案已準備好下載。");
            } catch (err) {
                console.error(err);
                announce("匯出失敗，請檢查瀏覽器設定。");
            }
        }

        /**
         * 核心功能：匯入 LocalStorage
         */
        function importProgress(event) {
            const file = event.target.files[0];
            if (!file) return;

            const reader = new FileReader();
            reader.onload = function(e) {
                try {
                    const importedData = JSON.parse(e.target.result);
                    
                    // 基礎格式驗證
                    if (!importedData.data) {
                        throw new Error("無效的備份格式");
                    }

                    const confirmMsg = `確定要匯入備份嗎？\n這將會覆蓋您目前的進度。\n備份時間：${importedData.exportedAt || '未知'}`;
                    
                    if (confirm(confirmMsg)) {
                        // 清除舊資料並寫入新資料
                        localStorage.clear();
                        Object.entries(importedData.data).forEach(([key, value]) => {
                            localStorage.setItem(key, value);
                        });
                        announce("進度載入完成！您的學習記錄已更新。");
                    } else {
                        announce("已取消載入操作，您的資料沒有變更。");
                    }
                } catch (err) {
                    console.error(err);
                    announce("載入失敗：檔案格式錯誤或損壞。");
                } finally {
                    // 清空 input 讓同一個檔案可以重複觸發 change
                    event.target.value = '';
                }
            };
            reader.readAsText(file);
        }

        // 初始化檢查（可選：用於開發偵錯）
        window.addEventListener('DOMContentLoaded', () => {
            console.log("1150628 Hub Initialized.");
        });
    </script>
</body>
</html>
